<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Form Validasyonu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <h1>Üyelik Formu</h1>
    </header>
    <main class="container">
        <form id="validationForm" action="#" method="post" novalidate>
            <div class="form-group">
                <label for="firstName">Ad</label>
                <input type="text" id="firstName" name="firstName" placeholder="Örn: Herhangi" required>
            </div>

            <div class="form-group">
                <label for="lastName">Soyad</label>
                <input type="text" id="lastName" name="lastName" placeholder="Örn: BIRI" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="telephone">Telefon</label>
                <input type="tel" id="telephone" name="telephone" placeholder="5xx xxx xxxx" required>
            </div>

            <div class="form-group">
                <label for="bio">Biyografi</label>
                <textarea id="bio" name="bio" rows="4" placeholder="Kendinizden bahsedin..." required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn">Formu Gönder</button>
            </div>
        </form>
    </main>
    <script src="scripts.js"></script>
</body>

</html>
